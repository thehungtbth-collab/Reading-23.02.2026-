ot in use</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'E')\\\"><span class=\\\"q-num-s\\\">15.</span> <span>mention of several advantages of driverless vehicles for individual road-users</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'E')\\\"><span class=\\\"q-num-s\\\">16.</span> <span>reference to the opportunity of choosing the most appropriate vehicle for each trip</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'E')\\\"><span class=\\\"q-num-s\\\">17.</span> <span>an estimate of how long it will take to overcome a number of problems</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'E')\\\"><span class=\\\"q-num-s\\\">18.</span> <span>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured</span></div>\\n                            </div>\\n                        </div><button class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t4')\\\">Show Translation</button><div id=\\\"t4\\\" class=\\\"vi-text hidden\\\"><span id=\\\"p4s0\\\" class=\\\"vi-sent\\\">Tự động hóa có thể thúc đẩy những thay đổi khác trong sản xuất ô tô. </span><span id=\\\"p4s1\\\" class=\\\"vi-sent\\\">Nếu chúng ta chuyển sang một mô hình mà người tiêu dùng có xu hướng không sở hữu một phương tiện duy nhất mà mua quyền sử dụng nhiều loại phương tiện thông qua nhà cung cấp dịch vụ di chuyển, người lái xe sẽ có quyền tự do lựa chọn phương tiện phù hợp nhất với nhu cầu của họ cho một hành trình cụ thể, thay vì phải thỏa hiệp với tất cả các yêu cầu của họ. </span><span id=\\\"p4s2\\\" class=\\\"vi-sent\\\">Vì trong hầu hết thời gian, hầu hết chỗ ngồi trên hầu hết các ô tô đều không có người sử dụng, điều này có thể thúc đẩy việc sản xuất các loại phương tiện nhỏ hơn, hiệu quả hơn phù hợp với nhu cầu của từng cá nhân. </span><span id=\\\"p4s3\\\" class=\\\"vi-sent\\\">Sau đó, các phương tiện chuyên dụng có thể được cung cấp cho những chuyến đi đặc biệt, chẳng hạn như đi cắm trại cùng gia đình hoặc giúp con cái chuyển đến trường đại học. </span></div></div><div class=\\\"para-box\\\"><div class=\\\"para-header-row\\\"><div class=\\\"para-header\\\">Paragraph F</div></div><p class=\\\"en-text\\\"><span class=\\\"sent\\\" data-target=\\\"p5s0\\\">There are a number of hurdles to overcome in delivering automated vehicles to our roads. </span><span class=\\\"sent\\\" data-target=\\\"p5s1\\\">These include the <span class=\\\"vocab\\\" data-vid=\\\"v16\\\">technical difficulties</span> in ensuring that the vehicle works reliably in the <span class=\\\"vocab\\\" data-vid=\\\"v17\\\">infinite</span> range of traffic, weather and road situations it might encounter; the regulatory challenges in understanding how liability and <span class=\\\"vocab\\\" data-vid=\\\"v18\\\">enforcement</span> might change when drivers are no longer essential for vehicle operation; and the societal changes that may be required for communities to trust and accept automated vehicles as being a valuable part of the mobility landscape. </span></p><button class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t5')\\\">Show Translation</button><div id=\\\"t5\\\" class=\\\"vi-text hidden\\\"><span id=\\\"p5s0\\\" class=\\\"vi-sent\\\">Có một số trở ngại cần vượt qua trong việc cung cấp phương tiện tự động trên đường của chúng ta. </span><span id=\\\"p5s1\\\" class=\\\"vi-sent\\\">Chúng bao gồm những khó khăn về mặt kỹ thuật trong việc đảm bảo rằng phương tiện hoạt động đáng tin cậy trong vô số tình huống giao thông, thời tiết và đường sá mà nó có thể gặp phải; những thách thức pháp lý trong việc tìm hiểu trách nhiệm pháp lý và việc thực thi có thể thay đổi như thế nào khi người lái xe không còn cần thiết cho việc vận hành phương tiện nữa; và những thay đổi xã hội có thể cần thiết để cộng đồng tin tưởng và chấp nhận phương tiện tự động hóa như một phần có giá trị trong bối cảnh di chuyển. </span></div></div><div class=\\\"para-box\\\"><div class=\\\"para-header-row\\\"><div class=\\\"para-header\\\">Paragraph G</div></div><p class=\\\"en-text\\\"><span class=\\\"sent\\\" data-target=\\\"p6s0\\\">It’s clear that there are many challenges that need to be addressed but, through <span class=\\\"vocab\\\" data-vid=\\\"v19\\\">robust</span> and targeted research, these can most probably be <span class=\\\"vocab\\\" data-vid=\\\"v20\\\">conquered</span> within the next 10 years. </span><span class=\\\"sent\\\" data-target=\\\"p6s1\\\">Mobility will change in such potentially significant ways and in association with so many other <span class=\\\"vocab\\\" data-vid=\\\"v21\\\">technological developments</span>, such as <span class=\\\"vocab\\\" data-vid=\\\"v22\\\">telepresence</span> and virtual reality, that it is hard to make <span class=\\\"vocab\\\" data-vid=\\\"v23\\\">concrete predictions</span> about the future. </span><span class=\\\"sent\\\" data-target=\\\"p6s2\\\">However, one thing is certain: change is coming, and the need to be <span class=\\\"vocab\\\" data-vid=\\\"v24\\\">flexible</span> in response to this will be vital for those involved in manufacturing the vehicles that will deliver future mobility. </span></p><div class=\\\"mif-inline-box\\\" data-para=\\\"G\\\">\\n                            <div style=\\\"font-size:12px; font-weight:bold; color:#4338ca; margin-bottom:8px; text-transform:uppercase;\\\">Questions matching this paragraph:</div>\\n                            <div style=\\\"display:flex; flex-direction:column; gap:6px;\\\">\\n                            <div class=\\\"mif-inline-btn\\\" data-qid=\\\"14\\\" onclick=\\\"toggleInlineMif(14, 'G')\\\"><span class=\\\"q-num-s\\\">14.</span> <span>reference to the amount of time when a car is not in use</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"15\\\" onclick=\\\"toggleInlineMif(15, 'G')\\\"><span class=\\\"q-num-s\\\">15.</span> <span>mention of several advantages of driverless vehicles for individual road-users</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"16\\\" onclick=\\\"toggleInlineMif(16, 'G')\\\"><span class=\\\"q-num-s\\\">16.</span> <span>reference to the opportunity of choosing the most appropriate vehicle for each trip</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"17\\\" onclick=\\\"toggleInlineMif(17, 'G')\\\"><span class=\\\"q-num-s\\\">17.</span> <span>an estimate of how long it will take to overcome a number of problems</span></div><div class=\\\"mif-inline-btn\\\" data-qid=\\\"18\\\" onclick=\\\"toggleInlineMif(18, 'G')\\\"><span class=\\\"q-num-s\\\">18.</span> <span>a suggestion that the use of driverless cars may have no effect on the number of vehicles manufactured</span></div>\\n                            </div>\\n                        </div><button class=\\\"trans-btn\\\" onclick=\\\"toggleTrans('t6')\\\">Show Translation</button><div id=\\\"t6\\\" class=\\\"vi-text hidden\\\"><span id=\\\"p6s0\\\" class=\\\"vi-sent\\\">Rõ ràng là có rất nhiều thách thức cần được giải quyết, nhưng thông qua nghiên cứu mạnh mẽ và có mục tiêu, những thách thức này hầu hết có thể được giải quyết trong vòng 10 năm tới. </span><span id=\\\"p6s1\\\" class=\\\"vi-sent\\\">Khả năng di chuyển sẽ thay đổi theo những cách có thể có ý nghĩa quan trọng và gắn liền với rất nhiều sự phát triển công nghệ khác, chẳng hạn như khả năng ngoại cảm và thực tế ảo, đến mức khó có thể đưa ra dự đoán cụ thể về tương lai. </span><span id=\\\"p6s2\\\" class=\\\"vi-sent\\\">Tuy nhiên, có một điều chắc chắn: sự thay đổi đang đến và nhu cầu phải linh hoạt để ứng phó với điều này sẽ rất quan trọng đối với những người tham gia sản xuất các phương tiện mang lại khả năng di chuyển trong tương lai. </span></div></div></div>\",\"headingsHtml\":\"\",\"qs\":[{\"id\":14,\"type\":\"mif\",\"text\":\"reference to the amount of time when a car is not in use\",\"options\":[],\"correctAnswer\":\"C\",\"loc no reduction in automotive manufacturing.\",\"gapIds\":[19,20,21,22],\"answers\":{\"19\":\"human error\",\"20\":\"car-sharing\",\"21\":\"ownership\",\"22\":\"mileage\"},\"locations\":{},\"_orderId\":19},{\"id\":23,\"type\":\"mcq\",\"text\":\"Which <b>TWO</b> benefits of automated vehicles does the writer mention?\",\"options\":[\"A   Car travellers could enjoy considerable cost savings.\",\"B   It would be easier to find parking spaces in urban areas.\",\"C   Travellers could spend journeys doing something other than driving.\",\"D   People who find driving physically difficult could travel independently.\",\"E   A reduction in the number of cars would mean a reduction in pollution.\"],\"correctAnswer\":\"C\",\"location\":\"\",\"_orderId\":23},{\"id\":25,\"type\":\"mcq\",\"text\":\"Which <b>TWO</b> challenges to automated vehicle development does the writer mention?\",\"options\":[\"A   making sure the general public has confidence in automated vehicles\",\"B   managing the pace of transition from conventional to automated vehicles\",\"C   deciding how to compensate professional drivers who become redundant\",\"D   setting up the infrastructure to make roads suitable for automated vehicles\",\"E   getting automated vehicles to adapt to various different driving conditions\"],\"correctAnswer\":\"A\",\"location\":\"\",\"_orderId\":25}],\"vocab\":[{\"id\":\"v0\",\"word\":\"automation\",\"meaning\":\"tự động hóa (mechanization, computerization)\",\"synonym\":\"The factory uses automation to increase efficiency. (Nhà máy sử dụng tự động hóa để tăng hiệu quả.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"implementation\",\"meaning\":\"sự thực hiện, triển khai (execution, application)\",\"synonym\":\"The implementation of new rules improved safety. (Việc triển khai quy định mới cải thiện an toàn.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"reliability\",\"meaning\":\"độ tin cậy (dependability, trustworthiness)\",\"synonym\":\"The system shows high reliability. (Hệ thống thể hiện độ tin cậy cao.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"flexibility\",\"meaning\":\"sự linh hoạt (adaptability, versatility)\",\"synonym\":\"She has great flexibility in problem-solving. (Cô ấy rất linh hoạt trong giải quyết vấn đề.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"capabilities\",\"meaning\":\"năng lực, khả năng (abilities, skills)\",\"synonym\":\"The robot has advanced capabilities. (Robot có năng lực tiên tiến.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"trialling\",\"meaning\":\"thử nghiệm (testing, piloting)\",\"synonym\":\"The company is trialling new software. (Công ty đang thử nghiệm phần mềm mới.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"advancing\",\"meaning\":\"tiến bộ, phát triển (progressing, moving forward)\",\"synonym\":\"Technology is rapidly advancing. (Công nghệ đang phát triển nhanh chóng.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"collisions\",\"meaning\":\"va chạm (crashes, impacts)\",\"synonym\":\"The car avoided collisions on the road. (Xe tránh được va chạm trên đường.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"human error\",\"meaning\":\"lỗi con người (mistake, oversight)\",\"synonym\":\"The accident was caused by human error. (Tai nạn do lỗi con người gây ra.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"productive\",\"meaning\":\"năng suất, hiệu quả (efficient, fruitful)\",\"synonym\":\"He had a productive day at work. (Anh ấy có một ngày làm việc hiệu quả.)\",\"example\":\"\"},{\"id\":\"v10\",\"word\":\"disabled travellers\",\"meaning\":\"khách du lịch khuyết tật (handicapped tourists)\",\"synonym\":\"Airports provide support for disabled travellers. (Sân bay hỗ trợ khách du lịch khuyết tật.)\",\"example\":\"\"},{\"id\":\"v11\",\"word\":\"autonomy\",\"meaning\":\"quyền tự chủ (independence, self-governance)\",\"synonym\":\"The robot has a degree of autonomy. (Robot có mức độ tự chủ nhất định.)\",\"example\":\"\"},{\"id\":\"v12\",\"word\":\"implications\",\"meaning\":\"hệ quả, tác động (consequences, effects)\",\"synonym\":\"The policy has serious implications. (Chính sách có hệ quả nghiêm trọng.)\",\"example\":\"\"},{\"id\":\"v13\",\"word\":\"mobility demand\",\"meaning\":\"nhu cầu di chuyển (transportation needs)\",\"synonym\":\"Cities face rising mobility demand. (Các thành phố đối mặt với nhu cầu di chuyển tăng cao.)\",\"example\":\"\"},{\"id\":\"v14\",\"word\":\"vehicle ownership\",\"meaning\":\"sở hữu phương tiện (car possession)\",\"synonym\":\"Vehicle ownership is increasing worldwide. (Sở hữu phương tiện đang tăng trên toàn cầu.)\",\"example\":\"\"},{\"id\":\"v15\",\"word\":\"unoccupied\",\"meaning\":\"bỏ trống, không có người (vacant, empty)\",\"synonym\":\"The house was unoccupied for years. (Ngôi nhà bị bỏ trống nhiều năm.)\",\"example\":\"\"},{\"id\":\"v16\",\"word\":\"technical difficulties\",\"meaning\":\"khó khăn kỹ thuật (problems, malfunctions)\",\"synonym\":\"The flight was delayed due to technical difficulties. (Chuyến bay bị hoãn vì khó khăn kỹ thuật.)\",\"example\":\"\"},{\"id\":\"v17\",\"word\":\"infinite\",\"meaning\":\"vô hạn (endless, limitless)\",\"synonym\":\"Space seems infinite. (Không gian dường như vô hạn.)\",\"example\":\"\"},{\"id\":\"v18\",\"word\":\"enforcement\",\"meaning\":\"sự thực thi (implementation, imposition)\",\"synonym\":\"Strict enforcement of laws is necessary. (Cần thực thi nghiêm ngặt luật pháp.)\",\"example\":\"\"},{\"id\":\"v19\",\"word\":\"robust\",\"meaning\":\"mạnh mẽ, bền chắc (strong, sturdy)\",\"synonym\":\"The system is robust against failures. (Hệ thống bền chắc trước sự cố.)\",\"example\":\"\"},{\"id\":\"v20\",\"word\":\"conquered\",\"meaning\":\"chinh phục (defeated, mastered)\",\"synonym\":\"The army conquered new lands. (Quân đội chinh phục vùng đất mới.)\",\"example\":\"\"},{\"id\":\"v21\",\"word\":\"technological developments\",\"meaning\":\"sự phát triển công nghệ (innovations, progress)\",\"synonym\":\"Recent technological developments changed industries. (Những phát triển công nghệ gần đây đã thay đổi ngành công nghiệp.)\",\"example\":\"\"},{\"id\":\"v22\",\"word\":\"telepresence\",\"meaning\":\"hiện diện từ xa (remote presence)\",\"synonym\":\"Telepresence allows virtual meetings. (Hiện diện từ xa cho phép họp trực tuyến.)\",\"example\":\"\"},{\"id\":\"v23\",\"word\":\"concrete predictions\",\"meaning\":\"dự đoán cụ thể (definite forecasts)\",\"synonym\":\"Experts made concrete predictions about climate change. (Các chuyên gia đưa ra dự đoán cụ thể về biến đổi khí hậu.)\",\"example\":\"\"},{\"id\":\"v24\",\"word\":\"flexible\",\"meaning\":\"linh hoạt (adaptable, versatile)\",\"synonym\":\"The schedule is flexible. (Lịch trình rất linh hoạt.)\",\"example\":\"\"}],\"headings\":[],\"headingKey\":{},\"mifRange\":\"ABCDEFG\",\"removeOpt\":false,\"removeFeatureOpt\":false,\"pairs\":[{\"eng\":\"automation\",\"vie\":\"tự động hóa (mechanization, computerization)\"},{\"eng\":\"implementation\",\"vie\":\"sự thực hiện, triển khai (execution, application)\"},{\"eng\":\"reliability\",\"vie\":\"độ tin cậy (dependability, trustworthiness)\"},{\"eng\":\"flexibility\",\"vie\":\"sự linh hoạt (adaptability, versatility)\"},{\"eng\":\"capabilities\",\"vie\":\"năng lực, khả năng (abilities, skills)\"},{\"eng\":\"trialling\",\"vie\":\"thử nghiệm (testing, piloting)\"},{\"eng\":\"advancing\",\"vie\":\"tiến bộ, phát triển (progressing, moving forward)\"},{\"eng\":\"collisions\",\"vie\":\"va chạm (crashes, impacts)\"},{\"eng\":\"human error\",\"vie\":\"lỗi con người (mistake, oversight)\"},{\"eng\":\"productive\",\"vie\":\"năng suất, hiệu quả (efficient, fruitful)\"},{\"eng\":\"disabled travellers\",\"vie\":\"khách du lịch khuyết tật (handicapped tourists)\"},{\"eng\":\"autonomy\",\"vie\":\"quyền tự chủ (independence, self-governance)\"},{\"eng\":\"implications\",\"vie\":\"hệ quả, tác động (consequences, effects)\"},{\"eng\":\"mobility demand\",\"vie\":\"nhu cầu di chuyển (transportation needs)\"},{\"eng\":\"vehicle ownership\",\"vie\":\"sở hữu phương tiện (car possession)\"},{\"eng\":\"unoccupied\",\"vie\":\"bỏ trống, không có người (vacant, empty)\"},{\"eng\":\"technical difficulties\",\"vie\":\"khó khăn kỹ thuật (problems, malfunctions)\"},{\"eng\":\"infinite\",\"vie\":\"vô hạn (endless, limitless)\"},{\"eng\":\"enforcement\",\"vie\":\"sự thực thi (implementation, imposition)\"},{\"eng\":\"robust\",\"vie\":\"mạnh mẽ, bền chắc (strong, sturdy)\"},{\"eng\":\"conquered\",\"vie\":\"chinh phục (defeated, mastered)\"},{\"eng\":\"technological developments\",\"vie\":\"sự phát triển công nghệ (innovations, progress)\"},{\"eng\":\"telepresence\",\"vie\":\"hiện diện từ xa (remote presence)\"},{\"eng\":\"concrete predictions\",\"vie\":\"dự đoán cụ thể (definite forecasts)\"},{\"eng\":\"flexible\",\"vie\":\"linh hoạt (adaptable, versatile)\"}],\"pData\":[{\"en\":[\"The automotive sector is well used to adapting to automation in manufacturing.\",\"The implementation of robotic car manufacture from the 1970s onwards led to significant cost savings and improvements in the reliability and flexibility of vehicle mass production.\",\"A new challenge to vehicle production is now on the horizon and, again, it comes from automation.\",\"However, this time it is not to do with the manufacturing process, but with the vehicles themselves.\",\"Research projects on vehicle automation are not new.\",\"Vehicles with limited self-driving capabilities have been around for more than 50 years, resulting in significant contributions towards driver assistance systems.\",\"But since Google announced in 2010 that it had been trialling self-driving cars on the streets of California, progress in this field has quickly gathered pace.\"],\"vi\":[\"Lĩnh vực ô tô được sử dụng tốt để thích ứng với tự động hóa trong sản xuất.\",\"Việc triển khai sản xuất ô tô bằng robot từ những năm 1970 trở đi đã giúp tiết kiệm đáng kể chi phí và cải thiện độ tin cậy cũng như tính linh hoạt của quá trình sản xuất hàng loạt ô tô.\",\"Một thách thức mới đối với việc sản xuất ô tô hiện đang xuất hiện và một lần nữa, nó lại đến từ tự động hóa.\",\"Tuy nhiên, lần này nó không liên quan đến quá trình sản xuất mà liên quan đến bản thân các phương tiện.\",\"Các dự án nghiên cứu về tự động hóa phương tiện không phải là mới.\",\"Những phương tiện có khả năng tự lái hạn chế đã tồn tại hơn 50 năm, dẫn đến những đóng góp đáng kể cho hệ thống hỗ trợ người lái.\",\"Nhưng kể từ khi Google công bố vào năm 2010 rằng họ đã thử nghiệm xe tự lái trên đường phố California, tiến bộ trong lĩnh vực này đã nhanh chóng tăng tốc.\"]},{\"en\":[\"There are many reasons why technology is advancing so fast.\",\"One frequently cited motive is safety; indeed, research at the UK’s Transport Research Laboratory has demonstrated that more than 90 percent of road collisions involve human error as a contributory factor, and it is the primary cause in the vast majority.\",\"Automation may help to reduce the incidence of this.\",\"Another aim is to free the time people spend driving for other purposes.\",\"If the vehicle can do some or all of the driving, it may be possible to be productive, to socialise or simply to relax while automation systems have responsibility for safe control of the vehicle.\",\"If the vehicle can do the driving, those who are challenged by existing mobility models – such as older or disabled travellers – may be able to enjoy significantly greater travel autonomy.\"],\"vi\":[\"Có nhiều lý do tại sao công nghệ tiến bộ nhanh thế.\",\"Một động cơ thường được trích dẫn là sự an toàn; quả thực, nghiên cứu tại Phòng thí nghiệm Nghiên cứu Giao thông Vận tải của Vương quốc Anh đã chứng minh rằng hơn 90% các vụ va chạm trên đường đều liên quan đến lỗi của con người như một yếu tố góp phần và đó là nguyên nhân chính trong đại đa số.\",\"Tự động hóa có thể giúp giảm tỷ lệ này.\",\"Một mục đích khác là giải phóng thời gian mọi người dành cho việc lái xe cho các mục đích khác.\",\"Nếu chiếc xe có thể thực hiện một số hoặc tất cả việc lái xe, nó có thể hoạt động hiệu quả, hòa nhập xã hội hoặc đơn giản là thư giãn trong khi hệ thống tự động hóa chịu trách nhiệm kiểm soát phương tiện một cách an toàn.\",\"Nếu phương tiện có thể tự lái, những người gặp khó khăn với các mô hình di chuyển hiện tại – chẳng hạn như khách du lịch lớn tuổi hoặc khuyết tật – có thể được hưởng quyền tự chủ di chuyển lớn hơn đáng kể.\"]},{\"en\":[\"Beyond these direct benefits, we can consider the wider implications for transport and society, and how manufacturing processes might need to respond as a result.\",\"At present, the average car spends more than 90 percent of its life parked.\",\"Automation means that initiatives for car-sharing become much more viable, particularly in urban areas with significant travel demand.\",\"If a significant proportion of the population choose to use shared automated vehicles, mobility demand can be met by far fewer vehicles.\"],\"vi\":[\"Ngoài những lợi ích trực tiếp này, chúng ta có thể xem xét những tác động rộng hơn đối với giao thông và xã hội, cũng như kết quả là các quy trình sản xuất có thể cần phải đáp ứng như thế nào.\",\"Hiện tại, trung bình một chiếc ô tô dành hơn 90% thời gian trong đời của nó để đỗ.\",\"Tự động hóa có nghĩa là các sáng kiến ​​chia sẻ ô tô trở nên khả thi hơn nhiều, đặc biệt là ở các khu vực thành thị có nhu cầu đi lại đáng kể.\",\"Nếu một tỷ lệ đáng kể dân số chọn sử dụng phương tiện tự động dùng chung thì nhu cầu di chuyển có thể được đáp ứng bởi ít phương tiện hơn rất nhiều.\"]},{\"en\":[\"The Massachusetts Institute of Technology investigated automated mobility in Singapore, finding that fewer than 30 percent of the vehicles currently used would be required if fully automated car sharing could be implemented.\",\"If this is the case, it might mean that we need to manufacture far fewer vehicles to meet demand.\",\"However, the number of trips being taken would probably increase, partly because empty vehicles would have to be moved from one customer to the next.\",\"Modelling work by the University of Michigan Transportation Research Institute suggests automated vehicles might reduce vehicle ownership by 43 percent, but that vehicles’ average annual mileage double as a result.\",\"As a consequence, each vehicle would be used more intensively, and might need replacing sooner.\",\"This faster rate of turnover may mean that vehicle production will not necessarily decrease\"],\"vi\":[\"Viện Công nghệ Massachusetts đã điều tra khả năng di chuyển tự động ở Singapore và nhận thấy rằng cần ít hơn 30% số phương tiện hiện đang được sử dụng nếu việc chia sẻ ô tô hoàn toàn tự động có thể được triển khai.\",\"Nếu đúng như vậy, điều đó có nghĩa là chúng ta cần sản xuất ít xe hơn để đáp ứng nhu cầu.\",\"Tuy nhiên, số lượng chuyến đi có thể sẽ tăng lên, một phần vì xe trống sẽ phải chuyển từ khách hàng này sang khách hàng khác.\",\"Công việc lập mô hình của Viện Nghiên cứu Giao thông Vận tải Đại học Michigan cho thấy phương tiện tự động có thể giảm tỷ lệ sở hữu phương tiện xuống 43%, nhưng kết quả là số dặm đi trung bình hàng năm của phương tiện đó sẽ tăng gấp đôi.\",\"Kết quả là mỗi chiếc xe sẽ được sử dụng với cường độ cao hơn và có thể cần thay thế sớm hơn.\",\"Tốc độ quay vòng nhanh hơn này có thể có nghĩa là sản lượng xe sẽ không nhất thiết giảm\"]},{\"en\":[\"Automation may prompt other changes in vehicle manufacture.\",\"If we move to a model where consumers are tending not to own a single vehicle but to purchase access to a range of vehicle through a mobility provider, drivers will have the freedom to select one that best suits their needs for a particular journey, rather than making a compromise across all their requirements.\",\"Since, for most of the time, most of the seats in most cars are unoccupied, this may boost production of a smaller, more efficient range of vehicles that suit the needs of individuals.\",\"Specialised vehicles may then be available for exceptional journeys, such as going on a family camping trip or helping a son or daughter move to university.\"],\"vi\":[\"Tự động hóa có thể thúc đẩy những thay đổi khác trong sản xuất ô tô.\",\"Nếu chúng ta chuyển sang một mô hình mà người tiêu dùng có xu hướng không sở hữu một phương tiện duy nhất mà mua quyền sử dụng nhiều loại phương tiện thông qua nhà cung cấp dịch vụ di chuyển, người lái xe sẽ có quyền tự do lựa chọn phương tiện phù hợp nhất với nhu cầu của họ cho một hành trình cụ thể, thay vì phải thỏa hiệp với tất cả các yêu cầu của họ.\",\"Vì trong hầu hết thời gian, hầu hết chỗ ngồi trên hầu hết các ô tô đều không có người sử dụng, điều này có thể thúc đẩy việc sản xuất các loại phương tiện nhỏ hơn, hiệu quả hơn phù hợp với nhu cầu của từng cá nhân.\",\"Sau đó, các phương tiện chuyên dụng có thể được cung cấp cho những chuyến đi đặc biệt, chẳng hạn như đi cắm trại cùng gia đình hoặc giúp con cái chuyển đến trường đại học.\"]},{\"en\":[\"There are a number of hurdles to overcome in delivering automated vehicles to our roads.\",\"These include the technical difficulties in ensuring that the vehicle works reliably in the infinite range of traffic, weather and road situations it might encounter; the regulatory challenges in understanding how liability and enforcement might change when drivers are no longer essential for vehicle operation; and the societal changes that may be required for communities to trust and accept automated vehicles as being a valuable part of the mobility landscape.\"],\"vi\":[\"Có một số trở ngại cần vượt qua trong việc cung cấp phương tiện tự động trên đường của chúng ta.\",\"Chúng bao gồm những khó khăn về mặt kỹ thuật trong việc đảm bảo rằng phương tiện hoạt động đáng tin cậy trong vô số tình huống giao thông, thời tiết và đường sá mà nó có thể gặp phải; những thách thức pháp lý trong việc tìm hiểu trách nhiệm pháp lý và việc thực thi có thể thay đổi như thế nào khi người lái xe không còn cần thiết cho việc vận hành phương tiện nữa; và những thay đổi xã hội có thể cần thiết để cộng đồng tin tưởng và chấp nhận phương tiện tự động hóa như một phần có giá trị trong bối cảnh di chuyển.\"]},{\"en\":[\"It’s clear that there are many challenges that need to be addressed but, through robust and targeted research, these can most probably be conquered within the next 10 years.\",\"Mobility will change in such potentially significant ways and in association with so many other technological developments, such as telepresence and virtual reality, that it is hard to make concrete predictions about the future.\",\"However, one thing is certain: change is coming, and the need to be flexible in response to this will be vital for those involved in manufacturing the vehicles that will deliver future mobility.\"],\"vi\":[\"Rõ ràng là có rất nhiều thách thức cần được giải quyết, nhưng thông qua nghiên cứu mạnh mẽ và có mục tiêu, những thách thức này hầu hết có thể được giải quyết trong vòng 10 năm tới.\",\"Khả năng di chuyển sẽ thay đổi theo những cách có thể có ý nghĩa quan trọng và gắn liền với rất nhiều sự phát triển công nghệ khác, chẳng hạn như khả năng ngoại cảm và thực tế ảo, đến mức khó có thể đưa ra dự đoán cụ thể về tương lai.\",\"Tuy nhiên, có một điều chắc chắn: sự thay đổi đang đến và nhu cầu phải linh hoạt để ứng phó với điều này sẽ rất quan trọng đối với những người tham gia sản xuất các phương tiện mang lại khả năng di chuyển trong tương lai.\"]}],\"timeLimit\":20}];\n\nlet currentLessonIndex = 0;\nlet qs, vocab, headings, headingKey, mifRange, removeOpt, removeFeatureOpt, pairs, pData;\n\nlet timeLeft = 0;\nlet timerInterval;\nconst timerEl = document.getElementById('timer');\n\nfunction startTimer() {\n    timerInterval = setInterval(() => {\n        if(timeLeft <= 0) {\n            clearInterval(timerInterval);\n            timerEl.innerText = \"00:00\";\n            alert(\"Time is up!\");\n            return;\n        }\n        timeLeft--;\n        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');\n        const s = (timeLeft % 60).toString().padStart(2, '0');\n        timerEl.innerText = `${m}:${s}`;\n    }, 1000);\n}\n\nfunction switchLesson(idx) {\n    currentLessonIndex = parseInt(idx);\n    const l = lessonsData[currentLessonIndex];\n    qs = l.qs; vocab = l.vocab; headings = l.headings; headingKey = l.headingKey;\n    mifRange = l.mifRange; removeOpt = l.removeOpt; removeFeatureOpt = l.removeFeatureOpt;\n    pairs = l.pairs; pData = l.pData;\n\n    // Reset UI\n    document.getElementById('articleArea').innerHTML = l.articleHtml;\n    document.getElementById('headingsArea').innerHTML = l.headingsHtml;\n    document.getElementById('qs').innerHTML = '';\n    document.getElementById('progressBar').innerHTML = '';\n    \n    // Reset Timer\n    clearInterval(timerInterval);\n    timeLeft = l.timeLimit * 60;\n    timerEl.innerText = \"--:--\";\n    startTimer();\n\n    // Render Questions & Attach Events\n    renderStudentQuestions();\n    attachEvents();\n\n    // Manage Views\n    if(document.getElementById('game-view').style.display === 'block') initGame();\n    if(document.getElementById('mif-view').style.display === 'flex') {\n        document.getElementById('mif-view').style.display = 'none';\n    }\n}\n\n// --- RENDERING QUESTIONS ---\nfunction renderStudentQuestions() {\n    const qDiv=document.getElementById('qs');\n    qDiv.innerHTML = '';\n    \n    qs.forEach(q=>{\n      if(q.type==='text-only'){ qDiv.innerHTML+=`<div class=\"text-only\">${q.text}</div>`; }\n      else if(q.type==='summary') { // Matching / Summary (Drag Drop)\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>');\n          q.gapIds.forEach(gid => {\n              const isFeat = q.isFeature ? 'true' : 'false';\n              const dz = `<span class=\"drop-zone\" id=\"dz-${gid}\" data-gid=\"${gid}\" data-isfeat=\"${isFeat}\" ondragover=\"allowDrop(event)\" ondrop=\"drop(event)\" onclick=\"clearDrop(${gid})\"></span><span class=\"q-num\" style=\"vertical-align:super;font-size:10px\">${gid}</span>&nbsp;`;\n              let replaced = txt.replace(new RegExp(`${gid}\\\\s*([._…-]{2,}|_{2,}|…+)`), dz);\n              if(replaced === txt) replaced = txt.replace(new RegExp(`${gid}[.]\\\\s+`), dz + ' ');\n              txt = replaced;\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2;font-size:15px\">${txt}</div><div style=\"margin-top:15px;display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;border-top:1px dashed #e2e8f0\">`;\n          q.options.forEach(optLine => {\n              const m = optLine.match(/^([A-Z])\\s*[.)]?\\s*(.+)/);\n              if(m) h += `<div class=\"heading-item\" id=\"opt-${q.id}-${m[1]}\" style=\"display:inline-flex;width:auto;margin:0\" draggable=\"true\" ondragstart=\"drag(event)\" data-val=\"${m[1]}\"><span style=\"font-weight:bold;color:#2563eb\">${m[1]}</span> ${m[2]}</div>`;\n          });\n          h += `</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      } \n      else if(q.type==='gap-fill-block') { // Paragraph Inputs\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          let txt = q.text.replace(/\\n/g, '<br>'); \n          q.gapIds.forEach(gid => {\n              const loc = (q.locations && q.locations[gid]) ? q.locations[gid] : \"\";\n              const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${gid})\">📍</button>` : \"\";\n              const inp = `<span class=\"q-num\">${gid}</span><input type=\"text\" class=\"gap-input\" data-gid=\"${gid}\" oninput=\"upd(${gid})\">${locBtn}&nbsp;`;\t\n              txt = txt.replace(new RegExp(`${gid}[\\\\s:.)]*(?:[_….\\\\-]\\\\s*){2,}`), inp);\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n          h += `<div style=\"line-height:2.2;font-size:16px\">${txt}</div><div id=\"fb-${q.id}\" style=\"margin-top:10px; font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n      }\n      else if(q.type==='mcq25') {\n          let h = `<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n          const locBtn1 = (q.locations && q.locations[q.gapIds[0]]) ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id}, ${q.gapIds[0]})\">📍</button>` : \"\";\n          h += `<div style=\"display:flex;align-items:baseline;margin-bottom:8px;\"><span class=\"q-num\">${q.gapIds[0]}-${q.gapIds[1]}</span> <span>${q.text}</span> ${locBtn1}</div>`;\n          q.options.forEach((o, i) => {\n              h += `<label style=\"display:block;margin:5px 0;cursor:pointer;transition:all 0.2s;\">\n                      <input type=\"checkbox\" name=\"mcq25_${q.id}\" value=\"${o.trim()[0]}\" onchange=\"updMcq25(${q.id}, ${q.gapIds[0]}, ${q.gapIds[1]}, event)\"> ${o} <span id=\"mcq25-mark-${q.id}-${i}\" class=\"mcq-mark\"></span>\n                    </label>`;\n          });\n          h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n          qDiv.innerHTML += h;\n          q.gapIds.forEach(gid => {\n              const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n              d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n              document.getElementById('progressBar').appendChild(d);\n          });\n      }\n      else { // Standard MCQ / Single Gap Fill\n        let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n        const loc = q.location || \"\";\n        const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n        \n        if(q.type==='gap-fill'){\n           let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn+'&nbsp;');\n           h+=`<div>${t}</div>`;\n        } else {\n           h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n           if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n           if(q.type==='tfng') {\n               h+='<div class=\"tfng-container\">';\n               ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='ynng') {\n               h+='<div class=\"tfng-container\">';\n               ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n                   h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"ynng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n               });\n               h+='</div>';\n           }\n           if(q.type==='mif') {\n               h+='<div class=\"mif-container\">';\n               mifRange.split('').forEach(char => {\n                   h+=`<label class=\"mif-label\"><input type=\"radio\" name=\"mif${q.id}\" value=\"${char}\" onchange=\"upd(${q.id})\"><span class=\"mif-circle\">${char}</span></label>`;\n               });\n               h+='</div>';\n           }\n        }\n        h+=`<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n        qDiv.innerHTML+=h;\n        const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+q.id; d.innerText=q.id;\n        d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n        document.getElementById('progressBar').appendChild(d);\n      }\n    });\n\n    // Auto-sync inline MIF radios to right-col checkboxes\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}\n\nfunction attachEvents() {\n    const pp = document.getElementById('popup');\n    // Vocab Popups\n    document.querySelectorAll('.vocab').forEach(s => {\n      s.onclick = e => {\n        const v = vocab.find(x => x.id === s.dataset.vid); if(!v) return;\n        pp.innerHTML = `<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n        pp.style.display = 'block'; pp.style.top = (e.clientY+10) + 'px'; pp.style.left = Math.min(e.clientX, window.innerWidth-330) + 'px';\n        e.stopPropagation();\n      }\n    });\n\n    // Translation Hovers\n    document.querySelectorAll('.sent').forEach(el => {\n        el.addEventListener('mouseenter', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = '#fef08a'; \n        });\n        el.addEventListener('mouseleave', () => {\n            const tid = el.getAttribute('data-target'); const t = document.getElementById(tid);\n            if(t) t.style.backgroundColor = 'transparent';\n        });\n    });\n}\n\n// Drag Drop (Reading)\nfunction allowDrop(ev) { ev.preventDefault(); }\nfunction drag(ev) { \n    ev.dataTransfer.setData(\"text\", ev.target.dataset.val); \n    ev.dataTransfer.setData(\"srcId\", ev.target.id); \n}\nfunction dragHeading(ev) { \n    const el = ev.target.closest('.heading-item');\n    ev.dataTransfer.setData(\"hid\", el.dataset.hid); \n    ev.dataTransfer.setData(\"srcId\", el.id); \n}\nfunction drop(ev) {\n    ev.preventDefault();\n    const zone = ev.target.closest('.drop-zone');\n    if(!zone) return;\n    \n    const type = zone.dataset.type;\n    if (type === 'heading') {\n        const hid = ev.dataTransfer.getData(\"hid\");\n        if(!hid) return; \n        zone.innerHTML = hid.toUpperCase(); \n        zone.dataset.val = hid; \n        zone.classList.add('filled');\n        \n        const srcId = ev.dataTransfer.getData(\"srcId\");\n        document.getElementById(srcId).classList.add('used');\n        if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) document.getElementById(zone.dataset.prevSrc).classList.remove('used');\n        zone.dataset.prevSrc = srcId;\n        return;\n    }\n    const val = ev.dataTransfer.getData(\"text\");\n    if(val) {\n        zone.innerText = val; \n        zone.classList.add('filled');\n        const gid = zone.dataset.gid;\n        document.getElementById('prog-'+gid).classList.add('filled');\n        \n        const isFeat = zone.dataset.isfeat === 'true';\n        const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n        \n        if(doRemove) {\n            const srcId = ev.dataTransfer.getData(\"srcId\");\n            if(srcId) {\n                const srcEl = document.getElementById(srcId);\n                if(srcEl) srcEl.classList.add('used');\n                if(zone.dataset.prevSrc && zone.dataset.prevSrc !== srcId) {\n                    const prevEl = document.getElementById(zone.dataset.prevSrc);\n                    if(prevEl) prevEl.classList.remove('used');\n                }\n                zone.dataset.prevSrc = srcId;\n            }\n        }\n    }\n}\n\nfunction clearHeading(idx) {\n    const el = document.querySelector(`.heading-drop[data-para=\"${idx}\"]`);\n    if(el.dataset.prevSrc) document.getElementById(el.dataset.prevSrc).classList.remove('used');\n    el.innerHTML = '<span class=\"placeholder\">Drop Heading Here</span>'; el.classList.remove('filled'); delete el.dataset.val;\n}\nfunction clearDrop(gid) {\n    const el = document.getElementById('dz-'+gid);\n    const isFeat = el.dataset.isfeat === 'true';\n    const doRemove = isFeat ? removeFeatureOpt : removeOpt;\n    \n    if(doRemove && el.dataset.prevSrc) {\n        const prevEl = document.getElementById(el.dataset.prevSrc);\n        if(prevEl) prevEl.classList.remove('used');\n        delete el.dataset.prevSrc;\n    }\n    \n    el.innerText=''; el.classList.remove('filled'); document.getElementById('prog-'+gid).classList.remove('filled');\n}\n\n// Highlight\nconst hlBtn = document.getElementById('hl-btn');\nlet currentRange = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-btn')) return;\n    if(e.target.closest('#game-view')) return;\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\n                hlBtn.style.display = 'block'; \n                hlBtn.style.top = (rect.top + window.scrollY - 35) + 'px'; \n                hlBtn.style.left = (rect.left + (rect.width/2) + 50) + 'px';\n                return;\n            }\n        }\n        hlBtn.style.display = 'none';\n    }, 10);\n});\nfunction applyHighlight(e) {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert(\"Selection too complex.\"); }\n        hlBtn.style.display = 'none';\n    }\n}\nwindow.removeHighlight = (el, e) => { e.stopPropagation(); const txt = document.createTextNode(el.innerText); el.parentNode.replaceChild(txt, el); hlBtn.style.display = 'none'; };\n\nwindow.showLoc = (qId, subId) => {\n    document.querySelectorAll('.loc-highlight').forEach(el => el.classList.remove('loc-highlight'));\n    const q = qs.find(x => x.id === qId); if(!q) return;\n    let text = \"\";\n    if(subId && q.locations && q.locations[subId]) text = q.locations[subId]; else if(q.location) text = q.location;\n    if(!text) return alert(\"No location data found.\");\n    \n    const cleanText = text.trim().replace(/\\s+/g, ' ').toLowerCase();\n    const sents = document.querySelectorAll('.sent'); let found = false;\n    sents.forEach(s => {\n        const sText = s.innerText.trim().replace(/\\s+/g, ' ').toLowerCase();\n        if(sText.includes(cleanText) || (cleanText.length > 20 && cleanText.includes(sText))) {\n            s.classList.add('loc-highlight');\n            if(!found) { s.scrollIntoView({behavior: 'smooth', block: 'center'}); found = true; }\n        }\n    });\n    if(!found) alert(\"Could not find exact text match in passage.\");\n};\n\nwindow.upd = (id) => document.getElementById('prog-'+id).classList.add('filled');\nwindow.updMcq25 = (qId, id1, id2, ev) => {\n    const checkboxes = document.querySelectorAll(`input[name=\"mcq25_${qId}\"]`);\n    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;\n    const p1 = document.getElementById('prog-'+id1); const p2 = document.getElementById('prog-'+id2);\n    if (checkedCount > 2) { ev.target.checked = false; alert(\"You can only choose maximum 2 options!\"); return; }\n    if(checkedCount >= 1) p1.classList.add('filled'); else p1.classList.remove('filled');\n    if(checkedCount === 2) p2.classList.add('filled'); else p2.classList.remove('filled');\n};\n\nwindow.check = () => {\n    document.querySelectorAll('.ans-key').forEach(e=>e.remove());\n    document.querySelectorAll('.input-correct, .input-wrong, .correct-zone, .wrong-zone, .correct-opt, .wrong-opt').forEach(e=>e.classList.remove('input-correct','input-wrong','correct-zone','wrong-zone','correct-opt','wrong-opt'));\n\tdocument.querySelectorAll('.prog-correct, .prog-wrong').forEach(e=>e.classList.remove('prog-correct','prog-wrong'));\n    document.querySelectorAll('.mcq-mark').forEach(e=>e.innerText='');\n\n    let score = 0, total = 0; let allAnswered = true;\n    \n    if(headings.length > 0) {\n        document.querySelectorAll('.heading-drop').forEach(z => {\n            const pIdx = z.dataset.para, userVal = (z.dataset.val || \"\").toUpperCase(), correctVal = (headingKey[pIdx] || \"\").toUpperCase();\n            if(correctVal) { \n                total++; const fb = document.getElementById('fb-h-'+pIdx);\n                if(userVal === correctVal) { fb.innerHTML = '<span class=\"correct\">✓</span>'; score++; } \n                else { fb.innerHTML = `<span class=\"wrong\">✗</span> <span class=\"correct\">${correctVal}</span>`; }\n            }\n        });\n    }\n\n    qs.forEach(q => {\n        if(q.type === 'summary' || q.type === 'gap-fill-block') {\n            total += q.gapIds.length;\n            q.gapIds.forEach(gid => {\n                let userVal = \"\"; let el = null; const keyVal = (q.answers[gid] || \"\").trim();\n                if(q.type==='summary') { \n                    el=document.getElementById('dz-'+gid); userVal = el?el.innerText.trim():\"\"; \n                    if(el) {\n                        if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('correct-zone'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { el.classList.add('wrong-zone'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); document.getElementById('prog-'+gid).classList.add('prog-wrong'); }\n                    }\n                }\n                if(q.type==='gap-fill-block') { \n                    el=document.querySelector(`input[data-gid=\"${gid}\"]`); userVal = el?el.value.trim():\"\"; \n                    if(el) {\n                         if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('input-correct'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { el.classList.add('input-wrong'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); document.getElementById('prog-'+gid).classList.add('prog-wrong'); }\n                    }\n                }\n            });\n        } \n        else if (q.type === 'mcq25') {\n            total += 2;\n            const checkboxes = document.querySelectorAll(`input[name=\"mcq25_${q.id}\"]:checked`);\n            let userVals = Array.from(checkboxes).map(cb => cb.value.toUpperCase());\n            let correctVals = q.gapIds.map(gid => (q.answers[gid] || \"\").toUpperCase().trim());\n            let origCorrectVals = [...correctVals];\n\n            let localScore = 0;\n            userVals.forEach(uv => { const idx = correctVals.indexOf(uv); if (idx > -1) { localScore++; correctVals[idx] = null; } });\n            score += localScore;\n\n            const allCheckboxes = document.querySelectorAll(`input[name=\"mcq25_${q.id}\"]`);\n            allCheckboxes.forEach((cb, i) => {\n                const val = cb.value.toUpperCase(); const markSpan = document.getElementById(`mcq25-mark-${q.id}-${i}`); const label = cb.closest('label');\n                label.style.border = 'none'; label.style.padding = '0'; label.style.backgroundColor = 'transparent'; if(markSpan) markSpan.innerHTML = '';\n                const isCorrectOption = origCorrectVals.includes(val);\n\n                if (cb.checked) {\n                    if (isCorrectOption) { if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold;\">✓</span>'; label.style.border = '2px dashed #16a34a'; label.style.padding = '4px 8px'; label.style.borderRadius = '6px'; label.style.backgroundColor = '#f0fdf4'; } \n                    else { if(markSpan) markSpan.innerHTML = '<span style=\"color:#dc2626; font-weight:bold;\">✗</span>'; label.style.border = '2px dashed #dc2626'; label.style.padding = '4px 8px'; label.style.borderRadius = '6px'; label.style.backgroundColor = '#fef2f2'; }\n                } else if (isCorrectOption) {\n                    if(markSpan) markSpan.innerHTML = '<span style=\"color:#16a34a; font-weight:bold;       const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;
      }
      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';
      frame.srcdoc = '<p>Chưa chọn bài</p>';
    };

    // allow Enter key to open when select focused
    select.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') openBtn.click();
    });

    // Escape để thoát toàn màn hình
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        exitFullscreenMode();
      }
    });
  </script>
</body>
</html>
