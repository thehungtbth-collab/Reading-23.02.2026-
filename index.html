\"_orderId\":5},{\"id\":6,\"type\":\"tfng\",\"text\":\"The unknown pots discovered in Efate had once been used for cooking.\",\"options\":[],\"correctAnswer\":\"NOT GIVEN\",\"location\":\"\",\"_orderId\":6},{\"id\":7,\"type\":\"tfng\",\"text\":\"The um buried in Efate site was plain as it was without any decoration.\",\"options\":[],\"correctAnswer\":\"NO\",\"location\":\"unmistakably a Lapita urn\",\"_orderId\":7},{\"type\":\"gap-fill-block\",\"id\":8,\"text\":\"Complete the following summary of the paragraphs of Reading Passage 1, using <strong>NO MORE THAN TWO WORDS</strong> from the Reading Passage 1 for each answer.\\nWrite your answers in boxes 8-10 on your answer sheet.\\nScientific Evident found in Efate site\\nTests show the human remains and the charcoal found in the buried um are from the start of the Lapita period. Yet The ………8…….. covering many of the Efate site did not come from that area.\\nThen examinations carried out on the ………9…….. discovered at Efate site reveal that not everyone buried there was a native living in the area. In fact, DNA could identify the Lapita’s nearest………10………..present-days.\\nChoose <b>NO MORE THAN THREE WORDS AND/OR A NUMBER</b> from the passage for each answer.\\nWhat did the Lapita travel in when they crossed the oceans? 11 ……\\nIn Irwins’s view, what would the Latipa have relied on to bring them fast back to the base? 12 ……\\nWhich sea creatures would have been an indication to the Lapita of where to find land? 13 ……\",\"gapIds\":[8,9,10,11,12,13],\"answers\":{\"8\":\"rock\",\"9\":\"teeth\",\"10\":\"descendants\",\"11\":\"canoes\",\"12\":\"trade winds\",\"13\":\"seabirds and turtles\"},\"locations\":{\"8\":\"the chemical makeup of the obsidian\",\"9\":\"chemical tests on the teeth \",\"10\":\"to find out who the Lapita actually were\",\"11\":\"All we can say for certain is that \",\"12\":\"they could turn about and catch\",\"13\":\"seabirds and turtles, coconuts and twigs\"},\"_orderId\":8}];\nconst vocab=[{\"id\":\"v0\",\"word\":\"sympathy\",\"meaning\":\"sự cảm thông (compassion, pity)\",\"synonym\":\"She felt deep sympathy for the victims. (Cô ấy cảm thông sâu sắc với các nạn nhân.)\",\"example\":\"\"},{\"id\":\"v1\",\"word\":\"expedition\",\"meaning\":\"cuộc thám hiểm, chuyến đi (journey, exploration)\",\"synonym\":\"They went on an Arctic expedition. (Họ tham gia chuyến thám hiểm Bắc Cực.)\",\"example\":\"\"},{\"id\":\"v2\",\"word\":\"remote\",\"meaning\":\"xa xôi, hẻo lánh (distant, isolated)\",\"synonym\":\"He lives in a remote village. (Anh ấy sống ở một ngôi làng xa xôi.)\",\"example\":\"\"},{\"id\":\"v3\",\"word\":\"tongue\",\"meaning\":\"lưỡi; ngôn ngữ (language, organ)\",\"synonym\":\"English is her mother tongue. (Tiếng Anh là ngôn ngữ mẹ đẻ của cô ấy.)\",\"example\":\"\"},{\"id\":\"v4\",\"word\":\"inhabited\",\"meaning\":\"có người ở (occupied, lived in)\",\"synonym\":\"The island is inhabited by fishermen. (Hòn đảo có người dân sinh sống.)\",\"example\":\"\"},{\"id\":\"v5\",\"word\":\"ubiquity\",\"meaning\":\"sự phổ biến, có mặt khắp nơi (omnipresence, prevalence)\",\"synonym\":\"The ubiquity of smartphones is undeniable. (Sự phổ biến của điện thoại thông minh là không thể phủ nhận.)\",\"example\":\"\"},{\"id\":\"v6\",\"word\":\"startling\",\"meaning\":\"gây ngạc nhiên, bất ngờ (surprising, shocking)\",\"synonym\":\"The results were startling. (Kết quả thật bất ngờ.)\",\"example\":\"\"},{\"id\":\"v7\",\"word\":\"seafaring\",\"meaning\":\"đi biển, hàng hải (maritime, nautical)\",\"synonym\":\"He comes from a seafaring family. (Anh ấy xuất thân từ một gia đình đi biển.)\",\"example\":\"\"},{\"id\":\"v8\",\"word\":\"gleaned\",\"meaning\":\"thu thập, nhặt nhạnh (collected, gathered)\",\"synonym\":\"Information was gleaned from old records. (Thông tin được thu thập từ hồ sơ cũ.)\",\"example\":\"\"},{\"id\":\"v9\",\"word\":\"sediments\",\"meaning\":\"trầm tích (deposits, residue)\",\"synonym\":\"The river carries sediments downstream. (Con sông mang theo trầm tích xuống hạ   });\n      h += `<div id=\"fb-${q.id}\" class=\"feedback\" style=\"margin-top:8px;font-size:13px\"></div></div>`;\n      qDiv.innerHTML += h;\n      q.gapIds.forEach(gid => {\n          const d=document.createElement('div'); d.className='progress-circle'; d.id='prog-'+gid; d.innerText=gid;\n          d.onclick=()=>document.getElementById('q-card-'+q.id).scrollIntoView({behavior:'smooth',block:'center'});\n          document.getElementById('progressBar').appendChild(d);\n      });\n  }\n  \n  else { // Standard MCQ / Single Gap Fill\n    let h=`<div class=\"q-block\" id=\"q-card-${q.id}\">`;\n    const loc = q.location || \"\";\n    const locBtn = loc ? `<button class=\"loc-btn\" onclick=\"showLoc(${q.id})\">📍</button>` : \"\";\n    \n    if(q.type==='gap-fill'){\n       let t=q.text.replace(/(\\d+)[\\s:.)]*(?:[_….\\-]\\s*){2,}/g, '<span class=\"q-num\">$1</span><input type=\"text\" class=\"gap-input\" data-id=\"'+q.id+'\" oninput=\"upd('+q.id+')\">'+locBtn);\n       h+=`<div>${t}</div>`;\n    } else {\n       h+=`<div style=\"display:flex;align-items:baseline\"><span class=\"q-num\">${q.id}.</span> <span>${q.text}</span> ${locBtn}</div>`;\n       if(q.type==='mcq') q.options.forEach((o, i) => { h += `<label class=\"mcq-label\" style=\"display:block;margin:5px 0;cursor:pointer\"><input type=\"radio\" name=\"q${q.id}\" value=\"${o.trim()[0]}\" onchange=\"upd(${q.id})\"> ${o} <span id=\"mcq-mark-${q.id}-${i}\" class=\"mcq-mark\"></span></label>`; });\n       if(q.type==='tfng') {\n           h+='<div class=\"tfng-container\">';\n           ['TRUE', 'FALSE', 'NOT GIVEN'].forEach(opt => {\n               \n               h+=`<label class=\"tfng-label\"><input type=\"radio\" name=\"tfng${q.id}\" value=\"${opt}\" onchange=\"upd(${q.id})\"><span class=\"tfng-btn\">${opt}</span></label>`;\n           });\n           h+='</div>';\n       }\n\t   if(q.type==='ynng') {\n           h+='<div class=\"tfng-container\">';\n           ['YES', 'NO', 'NOT GIVEN'].forEach(opt => {\n e = null;\ndocument.addEventListener('mouseup', (e) => {\n    if(e.target.closest('#hl-btn')) return;\n    if(e.target.closest('#game-view')) return; // No highlight in game\n    setTimeout(() => {\n        const sel = window.getSelection();\n        if(sel.toString().trim().length > 0) {\n            const range = sel.getRangeAt(0);\n            const parent = range.commonAncestorContainer.parentElement;\n            if(parent.closest('.en-text') || parent.closest('.q-block') || parent.closest('.text-only')) {\n                currentRange = range;\n                const rect = range.getBoundingClientRect();\nhlBtn.style.display = 'block'; \nhlBtn.style.top = (rect.top + window.scrollY - 35) + 'px'; \n// Trừ đi khoảng 50px ở toạ độ left để dịch nút Highlight sang bên trái, nhường vị trí trung tâm cho icon Laban\nhlBtn.style.left = (rect.left + (rect.width/2) + 50) + 'px';\n                return;\n            }\n        }\n        hlBtn.style.display = 'none';\n    }, 10);\n});\nfunction applyHighlight(e) {\n    e.preventDefault(); e.stopPropagation();\n    if(currentRange) {\n        const span = document.createElement('span'); span.className = 'user-highlight'; span.setAttribute('onclick', 'removeHighlight(this, event)');\n        try { currentRange.surroundContents(span); window.getSelection().removeAllRanges(); } catch(err) { alert(\"Selection too complex. Try selecting simpler text.\"); }\n        hlBtn.style.display = 'none';\n    }\n}\nwindow.removeHighlight = (el, e) => { e.stopPropagation(); const txt = document.createTextNode(el.innerText); el.parentNode.replaceChild(txt, el); hlBtn.style.display = 'none'; };\n\n// --- SHOW LOCATION LOGIC ---\nwindow.showLoc = (qId, subId) => {\n    // Clear old highlights\n    document.querySelectorAll('.loc-highlight').forEach(el => el.classList.remove('loc-highlight'));\n    \n    const q = qs.find(x => x.id === qId);\n    if(!q) return;\n    \n    let text = \"\";\n    if(subId && q.locations && q.locations[subId]) text = q.locations[subId];\n    else if(q.location) text = q.location;\n    \n    if(!text) return alert(\"No location data found.\");\n    \n    const cleanText = text.trim().replace(/\\s+/g, ' ').toLowerCase();\n    const sents = document.querySelectorAll('.sent');\n    let found = false;\n    \n    sents.forEach(s => {\n        const sText = s.innerText.trim().replace(/\\s+/g, ' ').toLowerCase();\n        // Check if sentence contains location text OR location text contains sentence (partial match)\n        if(sText.includes(cleanText) || (cleanText.length > 20 && cleanText.includes(sText))) {\n            s.classList.add('loc-highlight');\n            if(!found) {\n                s.scrollIntoView({behavior: 'smooth', block: 'center'});\n                found = true;\n            }\n        }\n    });\n    \n    if(!found) alert(\"Could not find exact text match in passage.\");\n};\n\n// --- TRANSLATION HOVER HIGHLIGHT ---\ndocument.querySelectorAll('.sent').forEach(el => {\n    el.addEventListener('mouseenter', () => {\n        const tid = el.getAttribute('data-target');\n        const t = document.getElementById(tid);\n        if(t) t.style.backgroundColor = '#fef08a'; \n    });\n    el.addEventListener('mouseleave', () => {\n        const tid = el.getAttribute('data-target');\n        const t = document.getElementById(tid);\n        if(t) t.style.backgroundColor = 'transparent';\n    });\n});\n\n// Check (Reading)\nwindow.upd = (id) => document.getElementById('prog-'+id).classList.add('filled');\n\nwindow.updMcq25 = (qId, id1, id2, ev) => {\n    const checkboxes = document.querySelectorAll(`input[name=\"mcq25_${qId}\"]`);\n    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;\n    const p1 = document.getElementById('prog-'+id1);\n    const p2 = document.getElementById('prog-'+id2);\n    \n    if (checkedCount > 2) {\n        ev.target.checked = false;\n        alert(\"You can only choose maximum 2 options!\");\n        return;\n    }\             if(el) {\n                        if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('correct-zone'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { \n                             el.classList.add('wrong-zone'); \n                             el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`);\n                             document.getElementById('prog-'+gid).classList.add('prog-wrong');\n                        }\n                    }\n                }\n                if(q.type==='gap-fill-block') { \n                    el=document.querySelector(`input[data-gid=\"${gid}\"]`); \n                    userVal = el?el.value.trim():\"\"; \n                    if(el) {\n                         if(userVal.toLowerCase() === keyVal.toLowerCase()) { el.classList.add('input-correct'); score++; document.getElementById('prog-'+gid).classList.add('prog-correct'); }\n                        else { \n                             el.classList.add('input-wrong');\n                             el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`);\n                             document.getElementById('prog-'+gid).classList.add('prog-wrong');\n                        }\n                    }\n                }\n            });\n        } \n        // ĐƯA MCQ25 RA THÀNH MỘT KHỐI ĐỘC LẬP TẠI ĐÂY\n        else if (q.type === 'mcq25') {\n            total += 2;\n            const checkboxes = document.querySelectorAll(`input[name=\"mcq25_${q.id}\"]:checked`);\n            let userVals = Array.from(checkboxes).map(cb => cb.value.toUpperCase());\n            let correctVals = q.gapIds.map(gid => (q.answers[gid] || \"\").toUpperCase().trim());\n            let origCorrectVals = [...correctVals];\n\n            let localScore = 0;\n            userVals.forEach(uv => {\n                const idx = correctVals.indexOf(uv);\n                if (idx                if(ok) el.classList.add('input-correct');\n                    else { el.classList.add('input-wrong'); el.insertAdjacentHTML('afterend', `<span class=\"ans-key\">${keyVal}</span>`); }\n                }\n            }\n            if(q.type==='tfng' || q.type==='ynng') {\n                 const inputName = q.type === 'tfng' ? `tfng${q.id}` : `ynng${q.id}`;\n                 const checked = document.querySelector(`input[name=\"${inputName}\"]:checked`);\n                 u = checked ? checked.value : \"\";\n                 \n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\n                 \n                 if(checked) {\n                     const btn = checked.nextElementSibling;\n                     if(ok) btn.classList.add('correct-opt');\n                     else {\n                         btn.classList.add('wrong-opt');\n                         document.getElementById('fb-'+q.id).insertAdjacentHTML('afterbegin', `<span class=\"ans-key\" style=\"margin-bottom:5px; display:inline-block\">${keyVal}</span> `);\n                     }\n                 } else if (!ok) {\n                     document.getElementById('fb-'+q.id).innerHTML += `<span class=\"ans-key\">${keyVal}</span>`;\n                 }\n            }\n            if(q.type==='mif') {\n                 const checked = document.querySelector(`input[name=\"mif${q.id}\"]:checked`);\n                 u = checked ? checked.value : \"\";\n                 if(u.toLowerCase() === keyVal.toLowerCase()) ok=true;\n                 if(checked) {\n                     const circle = checked.nextElementSibling;\n                     if(ok) circle.classList.add('correct-opt');\n                     else circle.classList.add('wrong-opt');\n                 }\n            }\n\n            if(ok) {\n                score++;\n                document.getElementById('prog-'+q.id).classList.add('prog-correct');\n            } else {\n                document.getElementById('prog-'+q.id).classList.add('prog-wrong');\n            }\n            \n            if(!ok && q.type !== 'summary' && q.type !== 'gap-fill-block') {\n                 const fb = document.getElementById('fb-'+q.id);\n                 fb.innerHTML = `<span class=\"wrong\">✗ Your: ${u||\"(empty)\"}</span> <span class=\"correct\">Key: ${keyVal}</span>`;\n            } else if(ok && q.type !== 'summary' && q.type !== 'gap-fill-block') {\n                 document.getElementById('fb-'+q.id).innerHTML = '<span class=\"correct\">✓ Correct</span>';\n            }\n        }\n    });\n\t\n\t\n    alert(`Score: ${score} / ${total}`);\n};\n\nwindow.toggleInlineMif = (qId, pChar) => {\n    const btn = document.querySelector(`.mif-inline-box[data-para=\"${pChar}\"] .mif-inline-btn[data-qid=\"${qId}\"]`);\n    if(!btn) return;\n    const isSelected = btn.classList.contains('selected');\n    \n    if (isSelected) {\n        // Bỏ chọn\n        btn.classList.remove('selected');\n        const radio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n        if(radio) radio.checked = false;\n        \n        // Hiện lại câu này ở các Passage khác\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(el => el.classList.remove('hidden-by-other'));\n        \n        // Tắt màu xanh Palette nếu ko còn chọn gì\n        const anyChecked = document.querySelector(`input[name=\"mif${qId}\"]:checked`);\n        if(!anyChecked) document.getElementById('prog-'+qId).classList.remove('filled');\n    } else {\n        // Chọn\n        btn.classList.add('selected');\n        const radio = document.querySelector(`input[name=\"mif${qId}\"][value=\"${pChar}\"]`);\n        if(radio) radio.checked = true;\n        \n        // Ẩn câu này khỏi các Passage khác\n        document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(el => {\n            if(el !== btn) { el.classList.remove('selected'); el.classList.add('hidden-by-other'); }\n        });\n        document.getElementById('prog-'+qId).classList.add('filled');\n    }\n};\n\n// Đồng bộ ngược: Khi học sinh tick Radio bên cột phải, tự động ẩn/hiện hộp ở cột trái\nsetTimeout(() => {\n    document.querySelectorAll('input[type=\"radio\"][name^=\"mif\"]').forEach(radio => {\n        radio.addEventListener('change', (e) => {\n            const qId = radio.name.replace('mif', '');\n            const pChar = radio.value;\n            \n            document.querySelectorAll(`.mif-inline-btn[data-qid=\"${qId}\"]`).forEach(btn => {\n                const btnPara = btn.closest('.mif-inline-box').dataset.para;\n                if(btnPara === pChar) {\n                    btn.classList.remove('hidden-by-other');\n                    btn.classList.add('selected');\n                } else {\n                    btn.classList.remove('selected');\n                    btn.classList.add('hidden-by-other');\n                }\n            });\n        });\n    });\n}, 500);\n// Utils\nwindow.toggleTrans=id=>document.getElementById(id).classList.toggle('hidden');\nconst rs=document.getElementById('rs'),lp=document.getElementById('lp');\nlet x=0,w=0,md=e=>{x=e.clientX;w=lp.offsetWidth;document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu)};\nlet mm=e=>lp.style.width=((w+e.clientX-x)/rs.parentElement.offsetWidth*100)+'%';\nlet mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};\nrs.addEventListener('mousedown',md);\n\nconst pp=document.getElementById('popup');\ndocument.querySelectorAll('.vocab').forEach(s=>{\n  s.onclick=e=>{\n    const v=vocab.find(x=>x.id===s.dataset.vid);if(!v)return;\n    pp.innerHTML=`<div style=\"background:#1e293b;color:#fff;padding:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center\"><span>${v.word}</span><span onclick=\"speak('${v.word}')\" style=\"cursor:pointer;background:#334155;padding:4px;border-radius:50%\">🔊</span></div><div style=\"padding:16px;font-size:14px;color:#334155\"><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Meaning:</b> ${v.meaning}</p><p style=\"margin-bottom:8px\"><b style=\"color:#0f172a\">Synonyms:</b> ${v.synonym}</p><div style=\"background:#f1f5f9;padding:8px;border-radius:6px;margin-top:8px;color:#475569;font-style:italic\">\"${v.example}\"</div></div>`;\n    pp.style.display='block';pp.style.top=(e.clientY+10)+'px';pp.style.left=Math.min(e.clientX,window.innerWidth-330)+'px';\n    e.stopPropagation();\n  }\n});\ndocument.onclick=e=>{if(!pp.contains(e.target) && e.target.id !== 'hl-btn') pp.style.display='none'};\nwindow.speak=t=>window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));\n\n/* ================================\n   GAME SCRIPT LOGIC\n   ================================ */\n\n/* ====== trạng thái ====== */\nlet state = { engOrder: [], shuffledVie: [], matches: {}, score: 0 };\nconst engListEl = document.getElementById('engList');\nconst vieListEl = document.getElementById('vieList');\nconst scoreEl = document.getElementById('score');\nconst confettiEl = document.getElementById('confetti');\n\n/* helper shuffle */\nfunction shuffleArray(arr){\n  const a = arr.slice();\n  for(let i=a.length-1;i>0;i--){\n    const j = Math.floor(Math.random()*(i+1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\n\n/* init */\nfunction initGame(){\n  state.matches = {}; state.score = 0;\n  if(pairs.length === 0) {\n      engListEl.innerHTML = '<div style=\"color:white;padding:20px\">No vocab data selected in the Generator!</div>';\n      return;\n  }\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i));\n  state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); updateScore(); initFlashcards(); renderFillList();\n}\n\n/* render eng */\nfunction renderEng(){\n  engListEl.innerHTML = '';\n  state.engOrder.forEach((origIndex, pos) => {\n    const p = pairs[origIndex];\n    const item = document.createElement('div');\n    item.className = 'g-eng-item';\n    item.dataset.origIndex = origIndex;\n    item.innerHTML = `\n      <div class=\"g-eng-left\">\n        <div class=\"g-index\">${pos+1}</div>\n        <div>\n          <div style=\"font-weight:700\">${p.eng}</div>\n          <div style=\"font-size:13px; color:var(--muted)\">English</div>\n        </div>\n      </div>\n      <div class=\"g-slot\" data-index=\"${origIndex}\" aria-label=\"drop slot\" tabindex=\"0\"><div class=\"inner\"></div></div>\n    `;\n    engListEl.appendChild(item);\n  });\n}\n\n/* render vie */\nfunction renderVie(){\n  vieListEl.innerHTML = '';\n  state.shuffledVie.forEach((text, idx) => {\n    const d = document.createElement('div');\n    d.className = 'g-vie-item';\n    d.draggable = true;\n    d.dataset.text = text;\n    d.id = 'vie-'+idx;\n    d.innerHTML = `<span style=\"font-weight:600\">${text}</span>`;\n    vieListEl.appendChild(d);\n\n    d.addEventListener('dragstart', e => {\n      d.classList.add('dragging');\n      e.dataTransfer.setData('text/plain', text);\n      currentPicked = {text, el:d};\n    });\n    d.addEventListener('dragend', ()=> d.classList.remove('dragging'));\n    d.addEventListener('click', () => {\n      if(currentPicked && currentPicked.el === d){ currentPicked = null; d.style.outline = ''; }\n      else { clearPicked(); currentPicked = {text, el:d}; d.style.outline = '2px solid rgba(6,182,212,0.18)'; }\n    });\n  });\n}\n\n/* drag & drop */\nfunction attachSlotEvents(){\n  const slots = document.querySelectorAll('.g-slot');\n  slots.forEach(slot => {\n    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('active'); });\n    slot.addEventListener('dragleave', () => slot.classList.remove('active'));\n    slot.addEventListener('drop', e => {\n      e.preventDefault(); slot.classList.remove('active');\n      const text = e.dataTransfer.getData('text/plain'); handleDrop(slot, text);\n    });\n    slot.addEventListener('click', () => { if(currentPicked) handleDrop(slot, currentPicked.text); });\n    slot.addEventListener('focus', () => slot.classList.add('highlight'));\n    slot.addEventListener('blur', () => slot.classList.remove('highlight'));\n    slot.addEventListener('keydown', e => { if(e.key === 'Enter' && currentPicked) handleDrop(slot, currentPicked.text); });\n  });\n}\n\nfunction handleDrop(slot, vieText){\n  const engIndex = Number(slot.dataset.index);\n  const correctVie = pairs[engIndex].vie;\n  if(state.matches[engIndex]) return;\n  if(vieText === correctVie){\n    slot.classList.add('correct');\n    slot.innerHTML = `<div class=\"inner\"><span style=\"color:#10b981;margin-right:5px\">✓</span> <span style=\"font-weight:700;color:var(--success)\">${vieText}</span></div>`;\n    slot.style.borderColor = 'rgba(16,185,129,0.9)'; slot.style.boxShadow = '0 10px 30px rgba(16,185,129,0.06)';\n    state.matches[engIndex] = vieText; state.score++; updateScore(); celebrate(); speak(pairs[engIndex].eng); removeVieItem(vieText);\n    if(state.score === pairs.length){ setTimeout(()=> alert('Chúc mừng! Bạn đã ghép đúng tất cả.'), 300); }\n  } else {\n    slot.classList.add('g-wrong'); setTimeout(()=> slot.classList.remove('g-wrong'), 420);\n    const vieEl = findVieElement(vieText);\n    if(vieEl){ vieEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:300}); }\n  }\n}\n\nfunction removeVieItem(text){ const el = findVieElement(text); if(el){ el.remove(); currentPicked = null; } }\nfunction findVieElement(text){ return Array.from(document.querySelectorAll('.g-vie-item')).find(x => x.dataset.text === text); }\nfunction updateScore(){ scoreEl.innerHTML = `Đúng: <strong>${state.score}</strong> / ${pairs.length}`; }\n\n/* confetti */\nfunction celebrate(){\n  const colors = ['#06b6d4','#f97316','#f43f5e','#10b981','#60a5fa'];\n  for(let i=0;i<18;i++){\n    const p = document.createElement('div'); p.className = 'piece';\n    p.style.left = Math.random()*100 + '%'; p.style.background = colors[Math.floor(Math.random()*colors.length)];\n    p.style.width = (8 + Math.random()*10) + 'px'; p.style.height = (10 + Math.random()*14) + 'px';\n    p.style.animationDuration = (900 + Math.random()*700) + 'ms'; confettiEl.appendChild(p); setTimeout(()=> p.remove(), 2000);\n  }\n}\n\n/* controls */\ndocument.getElementById('shuffleBtn').addEventListener('click', () => {\n  state.engOrder = shuffleArray(pairs.map((_,i)=>i)); state.shuffledVie = shuffleArray(pairs.map(p => p.vie));\n  renderEng(); renderVie(); attachSlotEvents(); state.matches = {}; state.score = 0; updateScore();\n});\ndocument.getElementById('resetBtn').addEventListener('click', () => initGame());\n\n/* touch fallback */\nlet currentPicked = null;\nfunction clearPicked(){ if(currentPicked && currentPicked.el) currentPicked.el.style.outline = ''; currentPicked = null; }\ndocument.addEventListener('click', (e) => { \n    if(!e.target.closest('.g-vie-item') && !e.target.closest('.g-slot')) clearPicked(); \n});\n\n/* FLASHCARDS */\nlet flashIndex = 0; let flashAuto = null;\nconst flashFront = document.getElementById('flashFront'); const flashBack = document.getElementById('flashBack'); const flashcardEl = document.getElementById('flashcard');\n\nfunction initFlashcards(){ flashIndex = 0; renderFlash(); }\nfunction renderFlash(){\n  if(pairs.length === 0){ flashFront.textContent = 'Không có từ nào'; flashBack.textContent = ''; return; }\n  const p = pairs[flashIndex]; flashFront.textContent = p.eng; flashBack.textContent = p.vie; flashcardEl.classList.remove('flipped'); flashcardEl.setAttribute('aria-pressed','false');\n}\ndocument.getElementById('nextCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex + 1) % pairs.length; renderFlash(); } });\ndocument.getElementById('prevCard').addEventListener('click', () => { if(pairs.length) { flashIndex = (flashIndex - 1 + pairs.length) % pairs.length; renderFlash(); } });\ndocument.getElementById('flipCard').addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\nflashcardEl.addEventListener('click', () => { flashcardEl.classList.toggle('flipped'); flashcardEl.setAttribute('aria-pressed', flashcardEl.classList.contains('flipped')); });\ndocument.getElementById('autoPlay').addEventListener('click', (e) => {\n  if(flashAuto){ clearInterval(flashAuto); flashAuto = null; e.target.textContent = 'Auto'; }\n  else { flashAuto = setInterval(()=>{ flashIndex = (flashIndex+1)%pairs.length; renderFlash(); }, 2000); e.target.textContent = 'Stop'; }\n});\ndocument.getElementById('showBoth').addEventListener('click', () => { flashcardEl.classList.add('flipped'); setTimeout(()=> flashcardEl.classList.remove('flipped'), 1600); });\n\n/* FILL-IN */\nconst fillListEl = document.getElementById('fillList'); const fillScoreEl = document.getElementById('fillScore');\nfunction renderFillList(){\n  fillListEl.innerHTML = '';\n  pairs.forEach((p, idx) => {\n    const row = document.createElement('div'); row.className = 'fill-row';\n    row.innerHTML = `<div class=\"vie\">${p.vie}</div><input type=\"text\" data-index=\"${idx}\" placeholder=\"Nhập tiếng Anh...\" /><div class=\"small\" style=\"min-width:120px\" id=\"hint-${idx}\"></div>`;\n    fillListEl.appendChild(row);\n    const input = row.querySelector('input');\n    input.addEventListener('focus', () => input.classList.remove('wrong'));\n    input.addEventListener('blur', () => {});\n  });\n  fillScoreEl.textContent = `Điểm: 0 / ${pairs.length}`;\n}\n\ndocument.getElementById('checkFill').addEventListener('click', () => {\n  let correct = 0;\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    const hint = document.getElementById(`hint-${idx}`);\n    const val = (input.value || '').trim().toLowerCase();\n    const target = p.eng.trim().toLowerCase();\n    if(val === target){\n      correct++; input.classList.add('correct'); input.classList.remove('wrong'); input.style.borderColor = 'rgba(16,185,129,0.9)'; hint.innerHTML = `<span class=\"correct-answer\">Đúng</span>`;\n    } else {\n      input.classList.remove('correct'); input.classList.add('wrong'); input.style.borderColor = 'rgba(244,63,94,0.9)'; hint.innerHTML = `<span class=\"wrong-answer\">Sai</span>`;\n    }\n  });\n  fillScoreEl.textContent = `Điểm: ${correct} / ${pairs.length}`;\n});\n\ndocument.getElementById('showAnswers').addEventListener('click', () => {\n  pairs.forEach((p, idx) => {\n    const input = fillListEl.querySelector(`input[data-index=\"${idx}\"]`);\n    input.value = p.eng; input.classList.add('correct'); input.style.borderColor = 'rgba(6,182,212,0.6)';\n    const hint = document.getElementById(`hint-${idx}`); hint.innerHTML = `<span class=\"correct-answer\">Đáp án</span>`;\n  });\n  fillScoreEl.textContent = `Điểm: ${pairs.length} / ${pairs.length}`;\n});\n\ndocument.getElementById('resetFill').addEventListener('click', () => renderFillList());\n\n<\/script>\n\n<script type=\"text/javascript\">var lbplugin_event_opt={\"extension_enable\":true,\"dict_type\":1,\"dbclk_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1},\"select_event\":{\"trigger\":\"none\",\"enable\":true,\"display\":1}};function loadScript(t,e){var n=document.createElement(\"script\");n.type=\"text/javascript\",n.readyState?n.onreadystatechange=function(){(\"loaded\"===n.readyState||\"complete\"===n.readyState)&&(n.onreadystatechange=null,e())}:n.onload=function(){e()},n.src=t,document.getElementsByTagName(\"head\")[0].appendChild(n)}setTimeout(function(){null==document.getElementById(\"lbdictex_find_popup\")&&loadScript(\"https://stc-laban.zdn.vn/dictionary/js/plugin/lbdictplugin.min.js?\"+Date.now()%1e4,function(){lbDictPlugin.init(lbplugin_event_opt)})},1e3);<\/script>\n</body>\n\n</html>"}];
    const select = document.getElementById('selectBai');
    const openBtn = document.getElementById('openBtn');
    const clearBtn = document.getElementById('clearBtn');
    const frame = document.getElementById('frame');
    const controlsBar = document.getElementById('controlsBar');

    // populate select
    items.forEach((it, idx) => {
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = it.name || it.filename || ('Bài ' + (idx+1));
      select.appendChild(opt);

    function enterFullscreenMode() {
      // hide controls and expand iframe
      controlsBar.classList.add('hidden');

      // create close button if chưa có
      if (!document.getElementById('closeFullscreen')) {
        const btn = document.createElement('button');
        btn.id = 'closeFullscreen';
        btn.textContent = 'Đóng toàn màn hình';
        btn.onclick = exitFullscreenMode;
        document.body.appendChild(btn);
      }

    function exitFullscreenMode() {
      // restore controls and iframe
      controlsBar.classList.remove('hidden');
      frame.classList.remove('fullscreen-frame');
      const btn = document.getElementById('closeFullscreen');
      if (btn) btn.remove();
    }

    openBtn.onclick = () => {
      const v = select.value;
      if (v === '') {
        alert('Vui lòng chọn một bài.');
        return;

      const it = items[+v];
      frame.srcdoc = it.content;

      // vào chế độ toàn màn hình
      enterFullscreenMode();
    };

    clearBtn.onclick = () => {
      select.value = '';

    document.addEventListener('keydown', (e) => {
